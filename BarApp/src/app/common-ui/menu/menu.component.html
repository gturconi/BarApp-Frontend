
<ion-menu contentId="main-content" class="desktop-menu">
  <ion-header>
    <ion-toolbar>
      <ion-title class="logo__name">Explorar</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-content class="ion-padding">

    <ion-list>
      <ion-item>
        <ion-icon aria-hidden="true" name="person" slot="start"></ion-icon>
        <ion-label>Iniciar Sesión</ion-label>
      </ion-item>
      <ion-item>
        <ion-icon aria-hidden="true" name="calendar" slot="start"></ion-icon>
        <ion-label>Reserva</ion-label>
      </ion-item>
    </ion-list>

    <ion-accordion-group>
      <ion-accordion value="first">
        <ion-item slot="header" color="light">
          <ion-icon aria-hidden="true" name="fast-food" slot="start"></ion-icon>
          <ion-label>Carta</ion-label>
        </ion-item>
        <div class="accordion-padding" slot="content">

          <ion-accordion-group >
            <ion-accordion value="first">
              <ion-item slot="header" color="light">
                <ion-icon aria-hidden="true" name="beer" slot="start"></ion-icon>
                <ion-label>Bebidas</ion-label>
              </ion-item>
              <div class="ion-padding" slot="content">First Content</div>
            </ion-accordion>

            <ion-accordion value="second">
              <ion-item slot="header" color="light">
                <ion-icon aria-hidden="true" name="restaurant" slot="start"></ion-icon>
                <ion-label>Platos Principales</ion-label>
              </ion-item>
              <div class="ion-padding" slot="content">Second Content</div>
            </ion-accordion>

            <ion-accordion value="third">
              <ion-item slot="header" color="light">
                <ion-icon aria-hidden="true" name="ice-cream" slot="start"></ion-icon>
                <ion-label>Postres</ion-label>
              </ion-item>
              <div class="ion-padding" slot="content">Third Content</div>
            </ion-accordion>
          </ion-accordion-group>

        </div>
      </ion-accordion>
    </ion-accordion-group>

    <ion-list>
      <ion-item>
        <ion-icon aria-hidden="true" name="mail" slot="start"></ion-icon>
        <ion-label>Contacto</ion-label>
      </ion-item>
      <ion-item>
        <ion-icon aria-hidden="true" name="help" slot="start"></ion-icon>
        <ion-label>Preguntas Frecuentes</ion-label>
      </ion-item>
    </ion-list>


  </ion-content>
</ion-menu>
<div class="ion-page" id="main-content">
  <ion-header class="desktop-menu">
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-menu-button></ion-menu-button>
      </ion-buttons>
      <ion-title class="logo__name">TDG<span class="point">net.</span></ion-title>
    </ion-toolbar>
  </ion-header>
</div>
  

<ion-tabs class="mobile-menu" *ngIf="isMobile">
  <ion-tab-bar slot="bottom" class="tabBar">

    <ion-tab-button tab="home" class="tabButton">
      <ion-icon name="home-sharp"></ion-icon>
      Inicio  
    </ion-tab-button>

    <ion-tab-button tab="carta" class="tabButton">
      <ion-icon name="fast-food"></ion-icon>
      Carta
    </ion-tab-button>

    <ion-tab-button tab="cart" class="tabButton">
      <ion-icon name="cart"></ion-icon>
      Orden
    </ion-tab-button>

    <ion-tab-button tab="calendar" class="tabButton">
      <ion-icon name="calendar"></ion-icon>
      Reserva
    </ion-tab-button>
    
    <ion-tab-button tab="ellipsis-vertical-sharp" class="tabButton">
      <ion-icon name="ellipsis-vertical-sharp"></ion-icon>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
