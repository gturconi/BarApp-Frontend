<ion-header>
    <ion-toolbar>
      <ion-title class="tittle">{{tituloHeader}}</ion-title>
    </ion-toolbar>
  </ion-header>

<ion-content>
    <ion-list>
        <ion-item *ngFor="let c of categories" class="categories">
            <ion-avatar slot="start">
                <ion-img src="{{c.url}}"></ion-img>
            </ion-avatar>
            <ion-label> {{c.titulo}}</ion-label>
        </ion-item>
    </ion-list>
</ion-content>
